<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catatan Keuangan Siswa</title>
    <!-- Menggunakan font Montserrat sesuai permintaan -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;800;900&display=swap" rel="stylesheet">
    <style>
        /* --- RESET & VARIABLES --- */
        *, *::before, *::after {
            box-sizing: border-box;
        }

        :root {
            /* Warna Fun & Energik */
            --teal: #1993b8;
            --teal-light: rgba(25, 147, 184, 0.15);
            --pink: #ff477e;
            --yellow: #ffcb05;
            --green: #00d28a;
            --bg-color: #f2f7f9;
            --text-dark: #2c3e50;
            --white: #ffffff;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            color: var(--text-dark);
            /* Latar belakang dengan pola dot samar agar tidak terlalu polos */
            background-image: radial-gradient(var(--teal-light) 2px, transparent 2px);
            background-size: 20px 20px;
        }

        /* --- MAIN CONTAINER --- */
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: var(--white);
            border-radius: 24px;
            /* Shadow yang solid tapi berwarna lembut, bukan hitam komik */
            box-shadow: 0px 15px 35px rgba(25, 147, 184, 0.15);
            overflow: hidden;
            position: relative;
            padding-bottom: 30px;
        }

        /* ELEMEN CHECKERBOARD #1993b8 di bagian atas container */
        .checkerboard-bar {
            height: 25px;
            width: 100%;
            background-image: 
                linear-gradient(45deg, var(--teal) 25%, transparent 25%), 
                linear-gradient(-45deg, var(--teal) 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, var(--teal) 75%), 
                linear-gradient(-45deg, transparent 75%, var(--teal) 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            margin-bottom: 25px;
        }

        /* --- HEADER & LOGO --- */
        img {
            display: block;
            margin: 0 auto 20px auto;
            max-width: 130px;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }

        h1 {
            text-align: center;
            margin: 0 25px 25px 25px;
            padding: 20px;
            font-size: 24px;
            font-weight: 900;
            color: var(--white);
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 16px;
            
            /* ELEMEN GRADASI HALFTONE */
            background: linear-gradient(135deg, var(--pink), var(--yellow));
            position: relative;
            z-index: 1;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(255, 71, 126, 0.3);
        }

        /* Layer dot putih transparan untuk efek halftone */
        h1::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: radial-gradient(rgba(255,255,255,0.4) 15%, transparent 15%);
            background-size: 10px 10px;
            z-index: -1; /* Berada di belakang teks tapi di atas gradasi */
        }

        /* --- FILTER SECTION --- */
        .filter-section, .summary, form, h3, table {
            width: 88%;
            margin-left: auto;
            margin-right: auto;
        }

        .filter-section {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .filter-section label {
            font-weight: 800;
            color: var(--teal);
            font-size: 15px;
        }

        .filter-section input {
            padding: 10px 15px;
            border: 2px solid var(--teal-light);
            border-radius: 12px;
            font-size: 16px;
            font-family: inherit;
            font-weight: 700;
            color: var(--text-dark);
            outline: none;
            width: 100%;
            max-width: 200px;
            background-color: #fafdfd;
            transition: all 0.3s ease;
        }

        .filter-section input:focus {
            border-color: var(--teal);
            box-shadow: 0 0 0 4px var(--teal-light);
        }

        /* --- SUMMARY CARDS --- */
        .summary {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
            gap: 12px;
        }

        .card {
            flex: 1;
            text-align: center;
            padding: 15px;
            border-radius: 16px;
            color: var(--white);
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card h3 { 
            margin: 0 0 8px 0; 
            font-size: 12px; 
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0.9;
        }

        .card p { 
            margin: 0; 
            font-size: 17px; 
            font-weight: 900; 
            word-break: break-word; 
        }

        /* Kartu dengan warna berani tapi modern (tanpa border) */
        .card.income { background: var(--green); box-shadow: 0 8px 15px rgba(0, 210, 138, 0.25); }
        .card.expense { background: var(--pink); box-shadow: 0 8px 15px rgba(255, 71, 126, 0.25); }
        .card.balance { background: var(--teal); box-shadow: 0 8px 15px rgba(25, 147, 184, 0.25); }
        
        /* --- FORM INPUT --- */
        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 35px;
            background-color: var(--white);
            padding: 25px;
            border-radius: 20px;
            border: 2px dashed var(--teal);
            position: relative;
        }

        form::before {
            content: 'Catat Baru ✏️';
            position: absolute;
            top: -14px;
            left: 20px;
            background: var(--teal);
            color: white;
            font-size: 12px;
            font-weight: 800;
            padding: 4px 12px;
            border-radius: 20px;
            text-transform: uppercase;
        }

        input, select {
            padding: 14px;
            border: 2px solid #e1e8ed;
            border-radius: 12px;
            font-size: 15px;
            font-family: inherit;
            font-weight: 600;
            outline: none;
            width: 100%;
            transition: all 0.3s ease;
            background: #f8fbff;
        }

        input:focus, select:focus {
            border-color: var(--teal);
            background: var(--white);
            box-shadow: 0 0 0 4px var(--teal-light);
        }

        button {
            padding: 15px;
            font-size: 16px;
            font-family: inherit;
            border: none;
            border-radius: 12px;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            letter-spacing: 1px;
        }

        form button[type="submit"] {
            background: var(--yellow);
            color: var(--text-dark);
            margin-top: 5px;
            box-shadow: 0 6px 15px rgba(255, 203, 5, 0.4);
        }

        form button[type="submit"]:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 203, 5, 0.5);
        }

        form button[type="submit"]:active { 
            transform: translateY(2px);
            box-shadow: 0 2px 10px rgba(255, 203, 5, 0.4);
        } 
        
        /* --- TRANSACTION HISTORY --- */
        h3.histori-title { 
            font-weight: 900; 
            font-size: 18px;
            color: var(--teal);
            margin-bottom: 15px; 
            display: flex;
            align-items: center;
        }

        table, thead, tbody {
            display: block;
            width: 88%;
            margin-left: auto;
            margin-right: auto;
        }

        th { display: none; } 

        tr {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--white);
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.04);
            border: 1px solid #f0f4f8;
            margin-bottom: 12px;
            padding: 15px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        tr:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(25, 147, 184, 0.12);
            border-color: var(--teal-light);
        }

        td {
            border: none;
            padding: 0;
            background: transparent;
        }

        td:first-child {
            flex: 1; 
            text-align: left;
            word-break: break-word;
            padding-right: 15px;
            font-size: 15px;
            font-weight: 700;
            color: var(--text-dark);
        }

        td:nth-child(2) {
            white-space: nowrap; 
            padding-right: 15px;
            text-align: right;
            font-size: 16px;
        }

        td:last-child {
            white-space: nowrap;
            text-align: right;
        }

        .text-green { color: var(--green); font-weight: 900; }
        .text-red { color: var(--pink); font-weight: 900; }
        
        .delete-btn {
            background-color: #f1f5f9;
            color: #94a3b8;
            padding: 8px 15px;
            font-size: 12px;
            border-radius: 8px;
            width: auto;
            display: inline-block;
            font-weight: 800;
        }

        .delete-btn:hover {
            background-color: #fee2e2;
            color: var(--pink);
        }

        .date-text {
            font-size: 12px;
            color: #8fa3b0;
            display: block;
            margin-top: 6px;
            font-weight: 600;
        }

        /* --- RESPONSIVE LAYOUT HP --- */
        @media (max-width: 500px) {
            body { padding: 10px; }
            .container { border-radius: 20px; }
            h1 { font-size: 20px; margin: 0 15px 20px 15px; padding: 15px; }
            
            .summary { flex-direction: column; gap: 12px; }
            
            .filter-section {
                flex-direction: column;
                align-items: stretch;
                text-align: center;
                gap: 10px;
            }
            .filter-section input { max-width: 100%; }
            form { padding: 20px; }

            table, thead, tbody { width: 100%; }
            tr {
                flex-wrap: wrap; 
                padding: 15px;
            }
            td:first-child {
                min-width: 100%; 
                margin-bottom: 10px;
                padding-right: 0;
            }
            td:nth-child(2) {
                flex: 1; 
                text-align: left; 
            }
            td:last-child {
                flex: 0; 
            }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Accent Checkerboard -->
    <div class="checkerboard-bar"></div>

    <img src="logo banksaku 3.png" alt="Logo Keuangan">

    <h1>Catatan Keuangan</h1>

    <div class="filter-section">
        <label for="monthFilter">Pilih Bulan:</label>
        <input type="month" id="monthFilter">
    </div>

    <div class="summary">
        <div class="card income">
            <h3>Pemasukan</h3>
            <p id="totalIncome">Rp 0</p>
        </div>
        <div class="card expense">
            <h3>Pengeluaran</h3>
            <p id="totalExpense">Rp 0</p>
        </div>
        <div class="card balance">
            <h3>Sisa Saldo</h3>
            <p id="totalBalance">Rp 0</p>
        </div>
    </div>

    <form id="transactionForm">
        <input type="date" id="date" required>
        <input type="text" id="desc" placeholder="Keterangan (Contoh: Beli Bakso)" required>
        <input type="number" id="amount" placeholder="Jumlah Uang (Contoh: 10000)" required>
        <select id="type">
            <option value="income">Pemasukan (+)</option>
            <option value="expense">Pengeluaran (-)</option>
        </select>
        <button type="submit">Tambah Catatan</button>
    </form>

    <h3 class="histori-title">Histori Transaksi</h3>
    <table>
        <thead>
            <tr>
                <th>Keterangan</th>
                <th>Jumlah</th>
                <th>Aksi</th>
            </tr>
        </thead>
        <tbody id="transactionList">
        </tbody>
    </table>
</div>

<script>
    // --- FITUR SOUND EFFECT (FILE MP3 LOKAL) ---
    const audioAdd = new Audio('koin masuk.wav'); 
    const audioDelete = new Audio('suara delete.wav');

    function playSound(type) {
        if (type === 'add') {
            audioAdd.currentTime = 0; 
            audioAdd.play().catch(e => console.log("Gagal memutar suara tambah:", e));
        } else if (type === 'delete') {
            audioDelete.currentTime = 0; 
            audioDelete.play().catch(e => console.log("Gagal memutar suara hapus:", e));
        }
    }
    // ------------------------------------------

    let transactions = JSON.parse(localStorage.getItem('transactions')) || [];

    const today = new Date();
    const year = today.getFullYear();
    const month = String(today.getMonth() + 1).padStart(2, '0');
    const day = String(today.getDate()).padStart(2, '0');
    
    const currentMonthStr = `${year}-${month}`; 
    const currentDateStr = `${year}-${month}-${day}`; 

    let isDataUpdated = false;
    transactions = transactions.map(trx => {
        if (!trx.date) {
            trx.date = currentDateStr;
            isDataUpdated = true;
        }
        return trx;
    });
    
    if (isDataUpdated) {
        localStorage.setItem('transactions', JSON.stringify(transactions));
    }

    document.getElementById('monthFilter').value = currentMonthStr;
    document.getElementById('date').value = currentDateStr;
    document.getElementById('monthFilter').addEventListener('change', updateUI);

    function formatRupiah(angka) {
        return 'Rp ' + angka.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
    }

    function updateUI() {
        const list = document.getElementById('transactionList');
        list.innerHTML = '';

        let income = 0;
        let expense = 0;
        const selectedMonth = document.getElementById('monthFilter').value; 

        transactions.forEach((trx, index) => {
            const trxMonth = trx.date.substring(0, 7); 

            if (trxMonth === selectedMonth) {
                if (trx.type === 'income') {
                    income += trx.amount;
                } else {
                    expense += trx.amount;
                }

                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>
                        ${trx.desc}
                        <span class="date-text">${trx.date}</span>
                    </td>
                    <td class="${trx.type === 'income' ? 'text-green' : 'text-red'}">
                        ${trx.type === 'income' ? '+' : '-'}${formatRupiah(trx.amount)}
                    </td>
                    <td><button class="delete-btn" onclick="deleteTransaction(${index})">Hapus</button></td>
                `;
                list.appendChild(row);
            }
        });

        const balance = income - expense;

        document.getElementById('totalIncome').innerText = formatRupiah(income);
        document.getElementById('totalExpense').innerText = formatRupiah(expense);
        document.getElementById('totalBalance').innerText = formatRupiah(balance);

        localStorage.setItem('transactions', JSON.stringify(transactions));
    }

    document.getElementById('transactionForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const date = document.getElementById('date').value;
        const desc = document.getElementById('desc').value;
        const amount = parseInt(document.getElementById('amount').value);
        const type = document.getElementById('type').value;

        transactions.push({ date, desc, amount, type });
        
        document.getElementById('desc').value = '';
        document.getElementById('amount').value = '';
        
        document.getElementById('monthFilter').value = date.substring(0, 7);
        
        playSound('add');
        
        updateUI();
    });

    window.deleteTransaction = function(index) {
        transactions.splice(index, 1);
        playSound('delete');
        updateUI();
    }

    updateUI();
</script>

</body>
</html>
