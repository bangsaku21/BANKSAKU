<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catatan Keuangan Siswa</title>
    <style>
        body {
            font-family: 'Montserrat', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #2c3e50;
        }
        .summary {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            gap: 10px;
        }
        .card {
            flex: 1;
            text-align: center;
            padding: 15px;
            border-radius: 8px;
            color: white;
        }
        .card h3 { margin: 0 0 10px 0; font-size: 16px; }
        .card p { margin: 0; font-size: 18px; font-weight: bold; }
        .card.income { background-color: #27ae60; }
        .card.expense { background-color: #e74c3c; }
        .card.balance { background-color: #2980b9; }
        
        form {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
            background-color: #ecf0f1;
            padding: 15px;
            border-radius: 8px;
        }
        input, select, button {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }
        button {
            background-color: #34495e;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        button:hover { background-color: #2c3e50; }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th { background-color: #ecf0f1; }
        .text-green { color: #27ae60; font-weight: bold; }
        .text-red { color: #e74c3c; font-weight: bold; }
        .delete-btn {
            background-color: #e74c3c;
            padding: 5px 10px;
            font-size: 12px;
            width: auto;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Catatan Keuangan</h1>

<img src="logo banksaku 3.png" alt="Logo Keuangan" style="display: block; margin: 0 auto 20px auto; max-width: 170px; border-radius: 10px;">

    <div class="summary">
        <div class="card income">
            <h3>Pemasukan</h3>
            <p id="totalIncome">Rp 0</p>
        </div>
        <div class="card expense">
            <h3>Pengeluaran</h3>
            <p id="totalExpense">Rp 0</p>
        </div>
        <div class="card balance">
            <h3>Sisa Saldo</h3>
            <p id="totalBalance">Rp 0</p>
        </div>
    </div>

    <form id="transactionForm">
        <input type="text" id="desc" placeholder="Keterangan & Tanggal (Contoh: Uang Saku 1 Juni 2026, Beli Bakso)" required>
        <input type="number" id="amount" placeholder="Jumlah Uang (Contoh: 10000)" required>
        <select id="type">
            <option value="income">Pemasukan (+)</option>
            <option value="expense">Pengeluaran (-)</option>
        </select>
        <button type="submit">Tambah Catatan</button>
    </form>

    <h3>Histori Transaksi</h3>
    <table>
        <thead>
            <tr>
                <th>Keterangan</th>
                <th>Jumlah</th>
                <th>Aksi</th>
            </tr>
        </thead>
        <tbody id="transactionList">
            <!-- Data akan muncul di sini -->
        </tbody>
    </table>
</div>

<script>
    // Ambil data dari Local Storage atau buat array kosong jika belum ada
    let transactions = JSON.parse(localStorage.getItem('transactions')) || [];

    function formatRupiah(angka) {
        return 'Rp ' + angka.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
    }

    function updateUI() {
        const list = document.getElementById('transactionList');
        list.innerHTML = '';

        let income = 0;
        let expense = 0;

        transactions.forEach((trx, index) => {
            if (trx.type === 'income') {
                income += trx.amount;
            } else {
                expense += trx.amount;
            }

            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${trx.desc}</td>
                <td class="${trx.type === 'income' ? 'text-green' : 'text-red'}">
                    ${trx.type === 'income' ? '+' : '-'}${formatRupiah(trx.amount)}
                </td>
                <td><button class="delete-btn" onclick="deleteTransaction(${index})">Hapus</button></td>
            `;
            list.appendChild(row);
        });

        const balance = income - expense;

        document.getElementById('totalIncome').innerText = formatRupiah(income);
        document.getElementById('totalExpense').innerText = formatRupiah(expense);
        document.getElementById('totalBalance').innerText = formatRupiah(balance);

        // Simpan ke Local Storage
        localStorage.setItem('transactions', JSON.stringify(transactions));
    }

    document.getElementById('transactionForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const desc = document.getElementById('desc').value;
        const amount = parseInt(document.getElementById('amount').value);
        const type = document.getElementById('type').value;

        transactions.push({ desc, amount, type });
        
        document.getElementById('desc').value = '';
        document.getElementById('amount').value = '';
        
        updateUI();
    });

    function deleteTransaction(index) {
        transactions.splice(index, 1);
        updateUI();
    }

    // Jalankan saat pertama kali dibuka
    updateUI();
</script>

</body>
</html>
